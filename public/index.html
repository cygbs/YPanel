<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YPanel</title>
  <link rel="stylesheet" href="client.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── 布局 ── */
    .app-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
    .content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── 标签栏 ── */
    .tab-bar {
      display: flex;
      align-items: center;
      background: #0f0f1e;
      height: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      user-select: none;
    }
    .tabs-scroll {
      flex: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 2px;
    }
    .tabs-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .tabs-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .tabs-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
    .tab {
      display: flex;
      align-items: center;
      flex: 0 1 180px;
      min-width: 80px;
      width: 180px;
      padding: 0 6px 0 12px;
      background: #1a1a2e;
      cursor: pointer;
      color: #888;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover {
      background: #22223a;
      color: #ccc;
    }
    .tab.active {
      background: #1a1a2e;
      color: #e0e0e0;
      box-shadow: 0 -1px 0 #50fa7b inset;
    }
    .tab-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .tab-close {
      margin-left: auto;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 18px;
      line-height: 1;
      color: #666;
      flex-shrink: 0;
    }
    .tab-close:hover {
      background: rgba(255, 85, 85, 0.25);
      color: #ff5555;
    }
    .tab-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      flex-shrink: 0;
      cursor: pointer;
      color: #666;
      font-size: 22px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .tab-add:hover {
      background: #22223a;
      color: #50fa7b;
    }

    /* ── 主页 ── */
    .page-home {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .quick-actions {
      height: 40px;
      flex-shrink: 0;
      background: #16162e;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    .quick-actions button {
      height: 28px;
      padding: 0 14px;
      background: #22224a;
      border: none;
      border-radius: 5px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .quick-actions button:hover {
      background: #2e2e5a;
      color: #fff;
    }
    .home-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .instance-list {
      flex: 1;
      background: #12122a;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, 120px);
      grid-auto-rows: 140px;
      gap: 8px;
      padding: 12px;
      align-content: start;
    }
    .instance-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: #161633;
      border-radius: 8px;
    }
    .inst-icon {
      width: 48px;
      height: 48px;
    }
    .inst-name {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .function-menu {
      width: 230px;
      flex-shrink: 0;
      background: #1a1a32;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px;
      gap: 8px;
    }
    .fm-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #12122a;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .fm-icon:hover {
      background: #22224a;
    }
    .fm-icon img {
      width: 40px;
      height: 40px;
    }
    .fm-name {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
      text-align: center;
      margin-bottom: 4px;
    }
    .fm-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .fm-btn {
      width: 100%;
      height: 38px;
      background: #22224a;
      border: none;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .fm-btn:hover {
      background: #2e2e5a;
      color: #fff;
    }
    .fm-empty {
      color: #666;
      font-size: 13px;
      margin-top: 40px;
    }
    .instance-card.selected {
      background: #1e1e4a;
      box-shadow: 0 0 0 1px #6272a4;
    }

    /* ── 终端 ── */
    .terminal-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    .terminal-view {
      width: 100%;
      height: 100%;
    }

    /* ── 对话框 ── */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .dialog {
      background: #1e1e3a;
      border-radius: 10px;
      width: 500px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .dialog-title {
      padding: 16px 20px 0;
      font-size: 16px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .dialog-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 12px;
      color: #999;
    }
    .input {
      height: 34px;
      padding: 0 10px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus {
      border-color: #6272a4;
    }
    .input.invalid {
      border-color: #ff5555;
    }
    .field-error {
      font-size: 11px;
      color: #ff5555;
    }
    .field-row {
      flex-direction: row !important;
      align-items: center !important;
      gap: 8px !important;
    }
    .checkbox {
      width: 16px;
      height: 16px;
      accent-color: #50fa7b;
      cursor: pointer;
      flex-shrink: 0;
    }
    .input.mono {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 12px;
    }
    .input[readonly] {
      color: #777;
      cursor: default;
    }
    .icon-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 10px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .icon-selector:hover {
      border-color: #6272a4;
    }
    .icon-preview {
      width: 20px;
      height: 20px;
    }
    .icon-name {
      font-size: 12px;
      color: #aaa;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      padding: 10px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      margin-top: 4px;
    }
    .icon-option {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .icon-option:hover {
      background: #2a2a4a;
    }
    .icon-option.selected {
      background: #3a3a6a;
    }
    .icon-option img {
      width: 24px;
      height: 24px;
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 20px 16px;
    }
    .btn {
      height: 34px;
      padding: 0 20px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary {
      background: #2a2a4a;
      color: #ccc;
    }
    .btn-secondary:hover {
      background: #3a3a5a;
    }
    .btn-primary {
      background: #50fa7b;
      color: #111;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: #69ff94;
    }
    .btn-danger {
      background: #ff5555;
      color: #fff;
      font-weight: 600;
    }
    .btn-danger:hover {
      background: #ff6e6e;
    }
    .dialog-sm .dialog-title {
      font-size: 15px;
    }
    .delete-warning {
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
      margin: 0;
    }
    .instance-card.selected {
      background: #1e1e4a;
      box-shadow: 0 0 0 1px #6272a4;
    }
    .fm-btn-danger {
      color: #ff6e6e;
    }
    .fm-btn-danger:hover {
      background: rgba(255, 85, 85, 0.2) !important;
      color: #ff5555 !important;
    }

    /* ── 滚动条 ── */
    .xterm-viewport::-webkit-scrollbar {
      width: 6px;
    }
    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="client.js"></script>
</body>
</html>
