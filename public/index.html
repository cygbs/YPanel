<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YPanel</title>
  <link rel="stylesheet" href="client.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── 布局 ── */
    .app-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
    .content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── 标签栏 ── */
    .tab-bar {
      display: flex;
      align-items: center;
      background: #0f0f1e;
      height: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      user-select: none;
    }
    .tabs-scroll {
      flex: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 2px;
    }
    .tabs-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .tabs-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .tabs-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
    .tab {
      display: flex;
      align-items: center;
      flex: 0 1 180px;
      min-width: 80px;
      width: 180px;
      padding: 0 6px 0 12px;
      background: #1a1a2e;
      cursor: pointer;
      color: #888;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover {
      background: #22223a;
      color: #ccc;
    }
    .tab.active {
      background: #1a1a2e;
      color: #e0e0e0;
      box-shadow: 0 -1px 0 #50fa7b inset;
    }
    .tab-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .tab-close {
      margin-left: auto;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 18px;
      line-height: 1;
      color: #666;
      flex-shrink: 0;
    }
    .tab-close:hover {
      background: rgba(255, 85, 85, 0.25);
      color: #ff5555;
    }
    .tab-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      flex-shrink: 0;
      cursor: pointer;
      color: #666;
      font-size: 22px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .tab-add:hover {
      background: #22223a;
      color: #50fa7b;
    }

    /* ── 主页 ── */
    .page-home {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .quick-actions {
      height: 40px;
      flex-shrink: 0;
      background: #16162e;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    .quick-actions button {
      height: 28px;
      padding: 0 14px;
      background: #22224a;
      border: none;
      border-radius: 5px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .quick-actions button:hover {
      background: #2e2e5a;
      color: #fff;
    }
    .home-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .instance-list {
      flex: 1;
      background: #12122a;
      overflow-y: auto;
    }
    .function-menu {
      width: 230px;
      flex-shrink: 0;
      background: #1a1a32;
      overflow-y: auto;
    }

    /* ── 终端 ── */
    .terminal-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    .terminal-view {
      width: 100%;
      height: 100%;
    }

    /* ── 滚动条 ── */
    .xterm-viewport::-webkit-scrollbar {
      width: 6px;
    }
    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="client.js"></script>
</body>
</html>
